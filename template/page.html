{%autoescape None%}
{%extends index.html%}
{%block header%}{%end%}
{%block content%}
	<div class='post'>
		<div class='post-head'>
			<h1 class='post-title'>{{row['title']}}</h1>
			<div class='post-meta'><span>{{row['author']}} Date:{{row['p_date']}}</span></div>
		</div>
		<div class='post-content'>
				
			{{row['content']}} 
						

		</div>

		<div class='post-cat'>
			<a href="/cat/{{row['cat_url']}}">{{row['cat']}}</a>
		</div>
	</div>	


{%end%}
