{%autoescape None%}
{%extends index.html%}
{% block header %}
{%end%}

{%block content%}
	<div class='tips'>
		分类文章：{{cat}}
	</div>
	{%for row in passage%}

	<div class='post'>
		<div class='post-head'>
			<h1 class='post-title'><a href="/single/{{row['url']}}">{{row['title']}}</a></h1>
			<div class='post-meta'><span>{{row['author']}} Date:{{row['p_date']}}</span></div>
		</div>
		<div class='post-content'>
						
			{{row['content']}} 
						

		</div>
		<div class='permalink'>
			<a href="/single/{{row['url']}}" class="btn-default btn-red">阅读全文</a>
		</div>
		<div class='post-cat'>
			<a href="/cat/{{row['cat_url']}}">{{row['cat']}}</a>
		</div>
	</div>	
	{%end%}

{%end%}
